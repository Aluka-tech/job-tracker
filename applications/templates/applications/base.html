{% load static %}
<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>{% block title %}Trackly{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'applications/css/style.css' %}">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
       <a href="{% url 'home' %}" class="logo">
    <span class="logo-mark">✦</span> Trackly
</a>

        <div class="nav-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'application_list' %}">My Applications</a>
            <a href="{% url 'add_application' %}">Add Application</a>
        </div>

        <form action="{% url 'logout' %}" method="POST" class="logout-form">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </nav>


    <!-- PAGE CONTENT -->
    <main class="content">
        {% block content %}
        {% endblock %}
    </main>


    <!-- TOAST -->
    <div id="toast">✓ Saved successfully</div>


    <script>
        const params = new URLSearchParams(window.location.search);

        if (params.get('saved')) {
            const toast = document.getElementById('toast');

            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>

</body>
</html>
