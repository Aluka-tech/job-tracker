{% extends "applications/base.html" %}

{% block content %}

<div style="max-width:600px; margin:0 auto;">
    <h1 style="margin-bottom:2rem;">Edit Application</h1>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom:1.25rem;">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p style="color:#ef4444; font-size:0.8rem;">{{ field.errors }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'application_detail' application.id %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
